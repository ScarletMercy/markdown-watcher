<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="katex/katex.min.css">
  <link rel="stylesheet" href="highlight/styles/github.min.css" id="hljs-theme">
  <link rel="stylesheet" href="themes/light.css" id="theme-css">
</head>
<body>
  <article id="content"></article>
  <!-- bundle -->
  <script src="preview.js"></script>
  <script>
    // mermaid loaded lazily on first mermaid block (design §4).
    // NOTE (M5): mermaid is a deploy-time asset served by Flutter from
    // assets/preview/mermaid/; it is NOT bundled by esbuild. `npm run build`
    // does not produce a standalone working preview without it.
    let mermaidReady = null;
    async function ensureMermaid() {
      if (!mermaidReady) {
        mermaidReady = import('./mermaid/mermaid.esm.min.mjs').then(m => {
          m.default.initialize({ startOnLoad: false });
          return m.default;
        });
      }
      return mermaidReady;
    }
    const cache = new Map();
    async function __render__(text, theme) {
      const t = (theme === 'dark') ? 'dark' : 'light';   // Fix 4 (M4): validate theme
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('content').innerHTML = window.renderMarkdown(text);
      const nodes = document.querySelectorAll('div.mermaid');
      try {
        if (nodes.length) {
          const mermaid = await ensureMermaid();
          // NOTE (I2): under the current full-innerHTML-replace strategy every .mermaid node
          // is brand-new each render (no data-processed), so mermaid.run renders it regardless
          // of shouldRender(). shouldRender()/the source-hash cache only becomes load-bearing
          // if/when rendering switches to incremental DOM updates. Kept for that future path.
          nodes.forEach((n, i) => {
            if (window.shouldRender('m' + i, n.textContent, cache)) n.removeAttribute('data-processed');
          });
          await mermaid.run({ nodes: Array.from(nodes) });
        }
      } catch (e) {
        console.error('mermaid render failed:', e);
      } finally {
        // Fix 1 (I3): always notify Flutter, with or without mermaid success
        if (window.__renderDone__) window.__renderDone__(collectOutline());
      }
    }
    function collectOutline() {
      return Array.from(document.querySelectorAll('h1,h2,h3'))
        .map(h => ({ level: +h.tagName[1], text: h.textContent,
          line: h.hasAttribute('data-source-line') ? +h.getAttribute('data-source-line') : null }));
    }
    // Fix 3 (M3): explicit global assignment (module-safe)
    window.__render__ = __render__;
  </script>
</body>
</html>
