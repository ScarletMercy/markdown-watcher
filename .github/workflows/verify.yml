# .github/workflows/verify.yml
#
# Phase 0b rendering verification — runs on every push/PR.
#
# Three jobs:
#   1. analyze-and-unit-test (ubuntu) — Dart analyze + the pure-Dart bridge
#      injection-safety unit test (no device needed).
#   2. android-render (ubuntu) — builds the app, runs integration_test on an
#      Android emulator; asserts code/KaTeX/Mermaid render in the WebView.
#   3. ios-render (macos-14) — the 生死 job: runs integration_test on an iOS
#      simulator, which probes Mermaid's dynamic worker import under file://
#      (the #1 risk flagged in the design + Phase 0b runbook).
#
# Patterned after Agolid/LocationHook/.github/workflows/build.yml
# (subosito/flutter-action, setup-java, analyze, build), extended with iOS +
# integration_test.
name: Verify Rendering

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (each run boots 2 emulators — expensive).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only — this workflow verifies, never publishes.
permissions:
  contents: read

jobs:
  analyze-and-unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Flutter pub get
        run: cd app && flutter pub get
      - name: Analyze
        run: cd app && flutter analyze --no-fatal-infos
      - name: Unit tests (pure-Dart bridge injection-safety)
        run: cd app && flutter test

  android-render:
    # DISABLED: flutter_inappwebview 6.1.5 (the maintenance-stale plugin) is
    # incompatible with Flutter 3.44's Android Gradle Plugin — its own
    # build.gradle uses getDefaultProguardFile('proguard-android.txt'), which
    # new AGP rejects. This is an ecosystem issue, not our code, and Android is
    # NOT the 生死 gate (iOS is). Re-enable once the plugin ships a fix or we
    # pin older Android tooling. The KVM step below is correct and kept for then.
    if: false
    needs: analyze-and-unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Java 17 needed for the Android gradle build. No `cache: gradle` because
      # the platform folders (app/android/) are generated by `flutter create`
      # below, after this step — there's no lockfile to key on yet.
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: preview/package-lock.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Install preview deps + sync assets into app
        run: |
          cd preview && npm ci
          bash ../app/scripts/sync-preview-assets.sh
      - name: Generate Android platform folders (manual scaffold has none)
        run: cd app && flutter create --platforms=android --project-name=markdown_watcher .
      - name: Flutter pub get
        run: cd app && flutter pub get
      # Grant KVM access — without it the emulator falls back to software
      # emulation and never boots (x86_64 too slow). Standard fix for
      # reactivecircus/android-emulator-runner on ubuntu runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run integration_test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          emulator-boot-timeout: 1200
          script: cd $GITHUB_WORKSPACE/app && flutter test integration_test/render_probe_test.dart

  ios-render:
    needs: analyze-and-unit-test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: preview/package-lock.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Install preview deps + sync assets into app
        run: |
          cd preview && npm ci
          bash ../app/scripts/sync-preview-assets.sh
      - name: Generate iOS platform folders (manual scaffold has none)
        run: cd app && flutter create --platforms=ios --project-name=markdown_watcher .
      - name: Flutter pub get
        run: cd app && flutter pub get
      # Resolve a UDID deterministically — multiple "iPhone 15" sims exist across
      # runtimes on macos-14 and `flutter test -d <name>` matching is unreliable.
      # flutter test generates the Podfile + runs pod install during its build,
      # so no separate pod step is needed here.
      - name: Boot iOS simulator (resolve UDID deterministically)
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((dv['udid'] for rt in d['devices'].values() for dv in rt if dv['name']=='iPhone 15' and dv['isAvailable']), ''))")
          [ -n "$UDID" ] || { echo "No available iPhone 15 simulator on this runner image"; exit 1; }
          echo "Resolved UDID=$UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true   # tolerate "Already Booted" on macos-14
          xcrun simctl bootstatus "$UDID"
          echo "UDID=$UDID" >> "$GITHUB_ENV"
      - name: Run integration_test on iOS simulator (the 生死 gate)
        run: cd app && flutter test integration_test/render_probe_test.dart -d "$UDID"
