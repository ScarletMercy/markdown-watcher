# .github/workflows/verify.yml
#
# Phase 0b rendering verification — runs on every push/PR.
#
# Three jobs:
#   1. analyze-and-unit-test (ubuntu) — Dart analyze + the pure-Dart bridge
#      injection-safety unit test (no device needed).
#   2. android-render (ubuntu) — builds the app, runs integration_test on an
#      Android emulator; asserts code/KaTeX/Mermaid render in the WebView.
#   3. ios-render (macos-14) — the 生死 job: runs integration_test on an iOS
#      simulator, which probes Mermaid's dynamic worker import under file://
#      (the #1 risk flagged in the design + Phase 0b runbook).
#
# Patterned after Agolid/LocationHook/.github/workflows/build.yml
# (subosito/flutter-action, setup-java, analyze, build), extended with iOS +
# integration_test.
name: Verify Rendering

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (each run boots 2 emulators — expensive).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only — this workflow verifies, never publishes.
permissions:
  contents: read

jobs:
  analyze-and-unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Flutter pub get
        run: cd app && flutter pub get
      - name: Analyze
        run: cd app && flutter analyze --no-fatal-infos
      - name: Unit tests (pure-Dart bridge injection-safety)
        run: cd app && flutter test

  android-render:
    needs: analyze-and-unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # for softprops/action-gh-release on v* tags
    steps:
      - uses: actions/checkout@v4
      # Java 17 needed for the Android gradle build. No `cache: gradle` because
      # the platform folders (app/android/) are generated by `flutter create`
      # below, after this step — there's no lockfile to key on yet.
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: preview/package-lock.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true
      - name: Install preview deps + sync assets into app
        run: |
          cd preview && npm ci
          bash ../app/scripts/sync-preview-assets.sh
      - name: Generate Android platform folders (manual scaffold has none)
        run: cd app && flutter create --platforms=android --project-name=markdown_watcher .
      - name: Flutter pub get
        run: cd app && flutter pub get
      # flutter_inappwebview 6.1.5's build.gradle references the legacy
      # proguard-android.txt, which Flutter 3.44's new AGP rejects at project
      # evaluation. Patch the plugin in pub-cache to use the supported file.
      # Stale-plugin workaround (CI-only; doesn't touch source). Debug builds
      # don't minify, so this only satisfies evaluation, no runtime effect.
      - name: Patch stale flutter_inappwebview proguard ref
        run: |
          find ~/.pub-cache -path "*flutter_inappwebview_android*/android/build.gradle" \
            -exec sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" {} \;
      # file_picker 11.0.2's android/build.gradle skips applying the Kotlin
      # Gradle plugin on AGP>=9 (it expects Flutter's built-in Kotlin). But CI's
      # gradle.properties pins android.builtInKotlin=false (Flutter migrator
      # added it for plugin compatibility), so file_picker's Kotlin sources never
      # compile -> GeneratedPluginRegistrant can't resolve FilePickerPlugin ->
      # ':app:compileDebugJavaWithJavac' fails. Force file_picker to apply KGP
      # regardless of AGP version. Safe: scoped to file_picker; does NOT touch
      # flutter_inappwebview or the global builtInKotlin=false flag.
      - name: Force file_picker Kotlin plugin (AGP9 + builtInKotlin=false)
        run: |
          find ~/.pub-cache -path "*file_picker-*/android/build.gradle" \
            -exec sed -i "s/if (!isAgp9OrAbove)/if (true)/g" {} \;
      # Configure the generated AndroidManifest for InAppLocalhostServer:
      #  - INTERNET: HttpServer.bind + WebView fetching http://localhost need it;
      #    flutter create only adds it to debug/profile manifests, so release
      #    builds lack it and the server never starts (stuck "Starting local
      #    server...").
      #  - cleartext: Android 9+ blocks http://localhost by default.
      - name: Configure AndroidManifest (INTERNET + cleartext)
        run: |
          MFST=app/android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n        <application|' "$MFST"
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' "$MFST"
      # Grant KVM access — without it the emulator falls back to software
      # emulation and never boots (x86_64 too slow). Standard fix for
      # reactivecircus/android-emulator-runner on ubuntu runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run integration_test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          emulator-boot-timeout: 1200
          script: cd $GITHUB_WORKSPACE/app && flutter test integration_test/render_probe_test.dart
      # The APK built during the emulator test is x86_64-only (matches the
      # emulator) — real phones are arm64 and reject it ("system incompatible").
      # Rebuild a fat debug APK (arm + arm64 + x64) for sideloading.
      - name: Build debug APK for real devices (all ABIs)
        if: always()
        run: cd app && flutter build apk --debug
      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-watcher-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
      # Release APK for real devices: arm64 + AOT-optimized (~15MB, vs ~70MB
      # debug fat). Published to GitHub Releases when a v* tag is pushed.
      # Uses the debug keystore fallback (debug-signed release-mode APK —
      # installable for sideloading, not for Play Store).
      - name: Build release APK (arm64)
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd app && flutter build apk --release --target-platform android-arm64
      - name: Publish release APK to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

