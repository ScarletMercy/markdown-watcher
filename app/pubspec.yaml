name: markdown_watcher
description: Top-tier mobile Markdown editor — Phase 0b rendering probe
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_riverpod: ^3.3.2
  # NOTE: riverpod core (flutter_riverpod/riverpod) is at 3.x, but the
  # annotation/codegen packages jumped to 4.x. 4.0.3 / 4.0.4 are the versions
  # that depend on riverpod 3.3.2, matching flutter_riverpod 3.3.2.
  riverpod_annotation: ^4.0.3
  # Phase 1a Task 2: file access. file_picker 11.0.2 + path 1.9.1 verified via
  # pub.dev API + context7 (2026-06-27).
  file_picker: ^11.0.2
  path: ^1.9.1
  # Phase 1a Task 7: SAF write-back helpers. Verified via context7 + pub.dev API
  # on 2026-06-27. saf_stream 3.0.0 + saf_util 3.1.0 both require
  #   sdk: ^3.12.0, flutter: >=3.44.0
  # The local Flutter 3.46 *master/beta* SDK can't resolve these (needs 3.12
  # stable); CI's Flutter stable resolves them. Do NOT run `flutter pub get` /
  # `flutter analyze` locally — CI validates compilation. See
  # saf_file_repository.dart for why saf_stream's write API can't target a
  # file_picker document URI directly (write takes treeUri+fileName, not a file
  # URI) and the app-private-storage fallback used instead.
  saf_stream: ^3.0.0
  saf_util: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^4.0.4
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/preview/
    - assets/preview/mermaid/
    - assets/preview/mermaid/chunks/mermaid.esm.min/
    - assets/preview/themes/
    - assets/preview/katex/
    - assets/preview/katex/fonts/
    - assets/preview/highlight/
    - assets/preview/highlight/styles/
